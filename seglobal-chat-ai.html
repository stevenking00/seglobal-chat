<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>S.E. Global — Chat</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #0a0a0a;
      color: #f0e6c8;
      font-family: 'Segoe UI', sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }

    .container { width: 100%; max-width: 560px; }

    .brand {
      font-size: 11px;
      letter-spacing: 3px;
      text-transform: uppercase;
      color: #c9a84c;
      margin-bottom: 8px;
    }

    h1 {
      font-size: 22px;
      font-weight: 600;
      color: #f0e6c8;
      margin-bottom: 32px;
    }

    .log {
      background: #111;
      border: 1px solid #222;
      border-radius: 8px;
      padding: 16px;
      min-height: 240px;
      max-height: 400px;
      overflow-y: auto;
      margin-bottom: 20px;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .log-empty {
      color: #444;
      font-size: 13px;
      margin: auto;
      text-align: center;
    }

    .bubble {
      padding: 10px 14px;
      border-radius: 6px;
      font-size: 13px;
      line-height: 1.6;
      max-width: 90%;
    }

    .bubble.user {
      background: #1a1a1a;
      border-left: 3px solid #c9a84c;
      color: #d4c4a0;
      align-self: flex-end;
    }

    .bubble.ai {
      background: #141414;
      border-left: 3px solid #4a7c59;
      color: #b8d4c0;
      align-self: flex-start;
    }

    .bubble.typing {
      background: #141414;
      border-left: 3px solid #333;
      color: #444;
      font-style: italic;
    }

    .bubble .meta {
      font-size: 10px;
      color: #444;
      margin-top: 4px;
    }

    .input-row {
      display: flex;
      gap: 10px;
    }

    input[type="text"] {
      flex: 1;
      background: #111;
      border: 1px solid #2a2a2a;
      border-radius: 6px;
      padding: 12px 16px;
      color: #f0e6c8;
      font-size: 14px;
      outline: none;
      transition: border-color 0.2s;
    }

    input[type="text"]:focus { border-color: #c9a84c; }
    input[type="text"]::placeholder { color: #444; }

    button {
      background: #c9a84c;
      color: #0a0a0a;
      border: none;
      border-radius: 6px;
      padding: 12px 22px;
      font-size: 13px;
      font-weight: 700;
      letter-spacing: 1px;
      cursor: pointer;
      transition: background 0.2s;
    }

    button:hover { background: #e0bf6a; }
    button:disabled { background: #2a2a2a; color: #555; cursor: not-allowed; }

    .status {
      margin-top: 12px;
      font-size: 12px;
      color: #555;
      min-height: 16px;
    }

    .status.err { color: #e05c5c; }
  </style>
</head>
<body>
<div class="container">
  <div class="brand">S.E. Global</div>
  <h1>Chat</h1>

  <div class="log" id="log">
    <div class="log-empty" id="emptyState">Send a message to begin.</div>
  </div>

  <div class="input-row">
    <input type="text" id="msg" placeholder="Type your message..." autocomplete="off" />
    <button id="sendBtn" onclick="send()">SEND</button>
  </div>

  <div class="status" id="status"></div>
</div>

<script>
  const SUPABASE_URL = "https://jbhtlakyttznbkfwghor.supabase.co";
  const ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImpiaHRsYWt5dHR6bmJrZndnaG9yIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzU2NTg1MDYsImV4cCI6MjA5MTIzNDUwNn0.mPlzfKm8LIZEB4XwST1MaKC9NK4Zl4utDQO-nq28aPA";
  const GROQ_KEY = "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";

  const SYSTEM_PROMPT = "You are the S.E. Global assistant. S.E. Global is a Benin City-based strategy and systems company built around the tagline Language as Strategy. You help visitors with clear, direct, and intelligent responses. Keep replies concise and professional. No hype, no filler.";

  function setStatus(msg, type) {
    const el = document.getElementById("status");
    el.textContent = msg;
    el.className = "status " + (type || "");
  }

  function addBubble(text, role, isTyping) {
    const log = document.getElementById("log");
    document.getElementById("emptyState").style.display = "none";
    const div = document.createElement("div");
    div.className = "bubble " + role + (isTyping ? " typing" : "");
    const time = new Date().toLocaleTimeString();
    div.innerHTML = escapeHTML(text) + '<div class="meta">' + (role === "user" ? "You" : "S.E. Global") + " · " + time + "</div>";
    if (isTyping) div.id = "typingBubble";
    log.appendChild(div);
    log.scrollTop = log.scrollHeight;
  }

  function removeTyping() {
    const el = document.getElementById("typingBubble");
    if (el) el.remove();
  }

  async function saveToSupabase(text) {
    try {
      await fetch(SUPABASE_URL + "/rest/v1/messages", {
        method: "POST",
        headers: {
          "Content-Type": "application/json",
          "apikey": ANON_KEY,
          "Authorization": "Bearer " + ANON_KEY
        },
        body: JSON.stringify({ text: text })
      });
    } catch (e) {}
  }

  async function getAIReply(userMessage) {
    const response = await fetch("https://api.groq.com/openai/v1/chat/completions", {
      method: "POST",
      headers: {
        "Content-Type": "application/json",
        "Authorization": "Bearer " + GROQ_KEY
      },
      body: JSON.stringify({
        model: "llama3-8b-8192",
        max_tokens: 1000,
        messages: [
          { role: "system", content: SYSTEM_PROMPT },
          { role: "user", content: userMessage }
        ]
      })
    });
    const data = await response.json();
    if (!response.ok) throw new Error(data.error ? data.error.message : "API error");
    return data.choices[0].message.content;
  }

  async function send() {
    const input = document.getElementById("msg");
    const btn = document.getElementById("sendBtn");
    const text = input.value.trim();
    if (!text) { setStatus("Type something first.", "err"); return; }

    btn.disabled = true;
    input.value = "";
    setStatus("");

    addBubble(text, "user");
    saveToSupabase(text);
    addBubble("Thinking...", "ai", true);
    setStatus("Getting reply...");

    try {
      const reply = await getAIReply(text);
      removeTyping();
      addBubble(reply, "ai");
      setStatus("");
    } catch (e) {
      removeTyping();
      setStatus("AI reply failed: " + e.message, "err");
    }

    btn.disabled = false;
    input.focus();
  }

  document.getElementById("msg").addEventListener("keydown", function(e) {
    if (e.key === "Enter") send();
  });

  function escapeHTML(str) {
    return str.replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;");
  }
</script>
</body>
</html>
